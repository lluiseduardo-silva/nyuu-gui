name: Release

on:
  push:
    tags: ['v*']

env:
  # Versão única do Node: usada para instalar (ABI do better-sqlite3) E embutida
  # no archive. As duas DEVEM bater — não altere uma sem a outra.
  NODE_VERSION: '22.12.0'

jobs:
  # ── Archives self-contained (app + runtime Node embutido + web/dist) ──
  archives:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: linux-x64 }
          # arm64 nativo exige runner arm64 (better-sqlite3 é por arquitetura).
          # Remova esta linha se seu repositório não tiver runners arm64.
          - { os: ubuntu-24.04-arm, target: linux-arm64 }
          - { os: windows-latest,   target: win-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar deps de produção + build
        shell: bash
        run: |
          npm --prefix server ci --omit=dev
          npm --prefix web ci
          npm run build

      - name: Empacotar
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/package-release.sh "$VERSION" "${{ matrix.target }}"

      - name: Anexar ao GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/out/*

  # ── Imagem Docker -> GHCR ──
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Para multi-arch (lento, via QEMU) adicione setup-qemu-action e:
          # platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
