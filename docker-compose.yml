services:
  nyuu-gui:
    build: .
    image: nyuu-gui
    container_name: nyuu-gui
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - DATA_DIR=/data
      - MOCK=0
    volumes:
      # Estado da app (banco, nyuu.json, logs, NZBs de saída).
      - nyuu-data:/data
      # IMPORTANTE: monte aqui sua biblioteca de mídia (origem dos backups).
      # Os caminhos que você escolhe na UI são os caminhos DENTRO do container.
      # Ex.: se sua biblioteca está em /mnt/midias no host, mantenha o mesmo caminho:
      - /mnt/midias:/mnt/midias

volumes:
  nyuu-data:
